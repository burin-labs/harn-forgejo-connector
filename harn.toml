[package]
name = "harn-forgejo-connector"
version = "0.2.0"
description = "Pure-Harn Forgejo connector: signed webhooks, self-hosted REST dispatch, and raw API helpers."
license = "MIT OR Apache-2.0"
repository = "https://github.com/burin-labs/harn-forgejo-connector"
connector_contract = "v1"

[exports]
default = "src/lib.harn"

[[providers]]
id = "forgejo"
connector = { harn = "src/lib.harn" }
capabilities = ["webhook", "rate_limit", "pagination"]

[providers.setup]
auth_type = "api-key"
flow = "api-key"
required_secrets = ["forgejo/api-token", "forgejo/webhook-secret"]
setup_command = ["harn", "connect", "forgejo"]
validation_command = ["harn", "connect", "status", "--connector", "forgejo", "--json"]

[[providers.setup.health_checks]]
id = "api-token"
kind = "secret"
secret = "forgejo/api-token"

[[providers.setup.health_checks]]
id = "webhook-secret"
kind = "secret"
secret = "forgejo/webhook-secret"

[providers.setup.recovery]
missing_auth = "Store forgejo/api-token and forgejo/webhook-secret before enabling Forgejo bindings."
expired_credentials = "Rotate forgejo/api-token, then rerun the Forgejo connection validation."
revoked_credentials = "Replace forgejo/api-token with an active Forgejo personal access token."
missing_scopes = "Grant repository and pull request scopes required by the configured Forgejo workflows."
inaccessible_resource = "Confirm the token can access the target Forgejo host, owner, and repository."
transient_provider_outage = "Retry after the Forgejo host API and webhook endpoints are healthy."

[dependencies]

[connector_contract]
version = 1

# Security sweep 2026-05-23 (F3): with no signing secret configured for this binding the
# connector now fail-closes with 401 missing_signature instead of accepting an unsigned
# delivery. The contract harness does not seed per-binding secrets, so the unsigned-happy-path
# fixture inverts to assert the rejection envelope. A future fixture-seeding contract bump
# can restore an "event" happy-path that exercises full verification end-to-end.
[[connector_contract.fixtures]]
provider = "forgejo"
name = "happy path (fail-closed when no secret)"
kind = "webhook"
headers = { "x-gitea-event" = "pull_request", "x-gitea-delivery" = "delivery-1" }
body_json = { action = "opened", repository = { full_name = "acme/widgets" }, sender = { login = "ada" }, pull_request = { number = 42, title = "Improve widgets" } }
expect_type = "reject"
expect_response_status = 401
expect_event_count = 0

# F14 (verify before parse) means malformed JSON without a configured secret hits the F3
# fail-closed path first and returns 401 instead of 400.
[[connector_contract.fixtures]]
provider = "forgejo"
name = "malformed payload"
kind = "webhook"
headers = { "x-gitea-event" = "pull_request" }
body = "{not json"
expect_type = "reject"
expect_response_status = 401
expect_event_count = 0

# C5 forge-parity: a conflicting pull_request (mergeable=false) still fail-closes at the
# unsigned gate here because the contract harness seeds no per-binding secret. The verified
# happy-path that surfaces `payload.merge.{is_conflict, merge_state}` is exercised in
# tests/parity.harn, which seeds the signing secret via init()/activate().
[[connector_contract.fixtures]]
provider = "forgejo"
name = "pull_request conflict (fail-closed when no secret)"
kind = "webhook"
headers = { "x-gitea-event" = "pull_request", "x-gitea-delivery" = "delivery-conflict" }
body_json = { action = "synchronized", repository = { full_name = "acme/widgets" }, sender = { login = "ada" }, pull_request = { number = 7, title = "Conflicting change", mergeable = false } }
expect_type = "reject"
expect_response_status = 401
expect_event_count = 0

# C5 forge-parity: an issue_comment carrying an `@handle command` mention. Verified extraction
# of `payload.mention.candidates` is covered in tests/parity.harn; here it fail-closes (no secret).
[[connector_contract.fixtures]]
provider = "forgejo"
name = "issue_comment mention (fail-closed when no secret)"
kind = "webhook"
headers = { "x-gitea-event" = "issue_comment", "x-gitea-delivery" = "delivery-mention" }
body_json = { action = "created", repository = { full_name = "acme/widgets" }, sender = { login = "carol" }, issue = { number = 12 }, comment = { body = "@harn-bot approve and merge now" } }
expect_type = "reject"
expect_response_status = 401
expect_event_count = 0
